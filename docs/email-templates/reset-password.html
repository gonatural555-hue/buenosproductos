<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><title>Reset password — referencia</title></head>
<body style="margin:0;padding:32px 16px;background:#0B0F14;font-family:sans-serif;">
  <table width="600" align="center" cellpadding="0" cellspacing="0" style="max-width:600px;background:#151B24;border-radius:16px;border:1px solid rgba(232,236,241,0.08);">
    <tr><td style="padding:28px 32px;border-bottom:1px solid rgba(232,236,241,0.08);">
      <p style="margin:0 0 8px;font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#3B82F6;">Buenos Productos</p>
      <h1 style="margin:0;font-size:22px;color:#E8ECF1;">Restablecer contraseña</h1>
    </td></tr>
    <tr><td style="padding:28px 32px;color:#E8ECF1;font-size:15px;line-height:1.6;">
      <p>Recibimos una solicitud para cambiar la contraseña de <strong>{{ .Email }}</strong>.</p>
      <p style="text-align:center;margin:24px 0;">
        <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:12px 28px;background:#3B82F6;color:#fff;text-decoration:none;border-radius:999px;font-weight:600;">Elegir nueva contraseña</a>
      </p>
      <p style="color:rgba(232,236,241,0.65);font-size:14px;">El enlace expira pronto. Si no pediste el cambio, ignorá este email.</p>
    </td></tr>
  </table>
</body>
</html>
