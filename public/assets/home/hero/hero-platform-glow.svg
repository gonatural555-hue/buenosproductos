  </defs>

  <ellipse cx="450" cy="210" rx="360" ry="115" fill="url(#glow)" filter="url(#blurGlow)"/>
  <ellipse cx="450" cy="210" rx="320" ry="72" stroke="url(#ring)" stroke-width="3"/>
  <ellipse cx="450" cy="210" rx="230" ry="44" stroke="#3B82F6" stroke-opacity="0.22" stroke-width="1.5"/>
  <ellipse cx="450" cy="212" rx="130" ry="22" fill="#3B82F6" fill-opacity="0.12"/>
</svg>
